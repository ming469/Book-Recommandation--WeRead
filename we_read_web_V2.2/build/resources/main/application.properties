# Application name
spring.application.name=we_read_web
# Server port
server.port=8081
# ==========================
# Database (MySQL) Config
# ==========================
# Database connection URL
spring.datasource.url=jdbc:mysql://localhost:3306/we_read_web?useSSL=false&serverTimezone=UTC&useUnicode=true&characterEncoding=utf8&allowPublicKeyRetrieval=true
# Database username
spring.datasource.username=root
# Database password
spring.datasource.password=ming469
# ==========================
# JPA Configuration
# ==========================
# Hibernate DDL auto-update policy
spring.jpa.hibernate.ddl-auto=none
# Show SQL queries (for debugging)
spring.jpa.show-sql=true
# Disable Open Session in View (recommended for performance)
spring.jpa.open-in-view=false
# Format SQL output
spring.jpa.properties.hibernate.format_sql=true
# ==========================
# Bean Configuration
# ==========================
# Allow bean definition overriding
spring.main.allow-bean-definition-overriding=true
# ==========================
# JWT Configuration
# ==========================
# JWT secret key
jwt.secret=WeReadWebWhichIsTheBestBookExploreWebSite
# JWT expiration time (milliseconds, default 24h)
jwt.expiration=86400000
# "Remember Me" JWT expiration (milliseconds, default 7 days)
jwt.remember-me-expiration=604800000
# ==========================
# Logging Configuration
# ==========================
# Spring Security logging level (for authentication & authorization debugging)
logging.level.org.springframework.security=DEBUG

# ==========================
# Redis Configuration
# ==========================
spring.redis.host=localhost
spring.redis.port=6379
# spring.redis.password=                         # 如有密码请取消注释并填写
spring.redis.timeout=2000ms
# Lettuce 连接池（可选）
spring.redis.lettuce.pool.max-active=8
spring.redis.lettuce.pool.max-idle=8
spring.redis.lettuce.pool.min-idle=0
spring.redis.lettuce.pool.max-wait=2000ms

# ==========================
# Recommendation Parameters
# ==========================
# Top-N seeds from user's recent/high-weight interactions
recommend.seedLimit=20
# Neighborhood size (Top-K similar items per seed)
recommend.topK=80
# Preference fusion strength (0.1 ~ 0.3 recommended)
recommend.alpha=0.2
# Category diversity cap ratio (per category max share)
recommend.categoryCapRatio=0.4
